<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bütçe</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#121212">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/4/4b/Money_bag_icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#121212',
                        cardbg: '#1E1E1E',
                        primary: '#BB86FC',
                        accent: '#03DAC6',
                        error: '#CF6679',
                        success: '#81C784'
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; }
        input, select, textarea { font-size: 16px !important; width: 100%; max-width: 100%; margin: 0; }
        .tab-active { color: #BB86FC; border-top: 2px solid #BB86FC; }
        .tab-inactive { color: #888; border-top: 2px solid transparent; }
        body { padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-darkbg text-gray-200 min-h-screen selection:bg-primary selection:text-black font-sans">

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 bg-darkbg z-50 flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-sm bg-cardbg p-8 rounded-2xl shadow-xl text-center">
            <h1 class="text-3xl mb-2">🔐</h1>
            <h2 class="text-xl font-bold text-primary mb-6">Uygulamaya Giriş</h2>
            <input type="password" id="passwordInput" placeholder="Şifrenizi girin" 
                class="w-full bg-darkbg text-white px-4 py-3 rounded-xl border border-gray-700 focus:border-primary outline-none mb-4 text-center">
            <button onclick="login()" id="loginBtn" class="w-full bg-primary text-black font-bold py-3 rounded-xl hover:bg-opacity-90 transition">Giriş Yap</button>
            <p id="loginError" class="text-error text-sm mt-3 hidden">Hatalı şifre!</p>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="mainApp" class="hidden h-full flex flex-col">
        
        <!-- HEADER -->
        <header class="bg-cardbg p-4 shadow-md sticky top-0 z-40 text-center">
            <h1 class="text-xl font-bold text-primary">💰 Bütçem</h1>
        </header>

        <main class="flex-1 p-4 max-w-md w-full mx-auto relative pb-8">
            <!-- VIEW 1: EKLE -->
            <div id="view-ekle" class="view-section">
                
                <!-- Hızlı Butonlar -->
                <div class="mb-5 flex gap-2 overflow-x-auto pb-2 scrollbar-none">
                    <button onclick="quickAction(100, 'Kahve', 'Gider', 'Yemek/Kahve')" class="shrink-0 bg-cardbg border border-gray-700 rounded-full px-4 py-2 text-sm flex items-center gap-1 active:scale-95 transition">☕ Kahve</button>
                    <button onclick="quickAction(25, 'Otobüs/Metro', 'Gider', 'Ulaşım/Akbil')" class="shrink-0 bg-cardbg border border-gray-700 rounded-full px-4 py-2 text-sm flex items-center gap-1 active:scale-95 transition">🚌 Ulaşım</button>
                    <button onclick="quickAction(300, 'Market', 'Gider', 'Market')" class="shrink-0 bg-cardbg border border-gray-700 rounded-full px-4 py-2 text-sm flex items-center gap-1 active:scale-95 transition">🛒 Market</button>
                </div>

                <div class="bg-cardbg rounded-2xl shadow-xl p-5 border border-gray-800">
                    <form id="budgetForm" class="space-y-4">
                        <!-- Tutar -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Tutar</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl text-gray-400">₺</span>
                                <input type="number" id="amount" step="0.01" inputmode="decimal" placeholder="0.00" required
                                    class="w-full bg-darkbg text-white text-3xl font-bold pl-10 pr-4 py-3 rounded-xl border border-gray-700 focus:border-primary outline-none transition-colors">
                            </div>
                        </div>

                        <!-- Tür (Gelir/Gider) -->
                        <div class="flex bg-darkbg rounded-xl p-1 border border-gray-700">
                            <button type="button" id="btnExpense" class="flex-1 py-2 text-sm font-medium transition-all bg-error text-black rounded-lg" onclick="setType('Gider')">Gider</button>
                            <button type="button" id="btnIncome" class="flex-1 py-2 text-sm font-medium text-gray-400 transition-all rounded-lg" onclick="setType('Gelir')">Gelir</button>
                        </div>
                        <input type="hidden" id="type" value="Gider">

                        <!-- Kategori -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Kategori</label>
                            <select id="category" required class="w-full bg-darkbg text-white px-4 py-3 rounded-xl border border-gray-700 outline-none">
                                <option value="" disabled selected>Yükleniyor...</option>
                            </select>
                        </div>

                        <!-- Açıklama -->
                        <div>
                            <input type="text" id="description" placeholder="Açıklama (Opsiyonel)" class="w-full bg-darkbg text-white px-4 py-3 rounded-xl border border-gray-700 outline-none">
                        </div>

                        <!-- Tarih -->
                        <div class="relative w-full h-[56px] bg-darkbg rounded-xl border border-gray-700 flex items-center px-4 overflow-hidden">
                            <input type="date" id="date" 
                                class="absolute inset-0 w-full h-full opacity-0 z-20 cursor-pointer bg-transparent border-0 m-0 p-0 text-transparent outline-none appearance-none translate-x-[-1px]">
                            <span id="dateDisplay" class="text-white pointer-events-none z-10">...</span>
                            <span class="ml-auto text-gray-400 pointer-events-none z-10">📅</span>
                        </div>

                        <button type="submit" id="submitBtn" class="w-full bg-primary hover:bg-opacity-90 text-black font-bold text-lg py-4 rounded-xl shadow-lg active:scale-95 transition-all mt-2">Kaydet</button>
                    </form>
                </div>
            </div>

            <!-- VIEW 2: GEÇMİŞ -->
            <div id="view-gecmis" class="view-section hidden">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold">Geçmiş İşlemler</h2>
                    <button onclick="loadDashboard()" class="text-primary text-sm">Yenile</button>
                </div>
                <div id="historyList" class="space-y-3">
                    <div class="text-center text-gray-500 py-10">Yükleniyor...</div>
                </div>
            </div>

            <!-- VIEW 3: ÖZET / DASHBOARD -->
            <div id="view-ozet" class="view-section hidden">
                <h2 class="text-xl font-bold mb-4">Bu Ayki Özet</h2>
                
                <!-- Summary Cards -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-cardbg p-4 rounded-xl border border-gray-800 text-center">
                        <p class="text-xs text-gray-400 uppercase mb-1">Gelir</p>
                        <p id="sumIncome" class="text-lg font-bold text-success">0 ₺</p>
                    </div>
                    <div class="bg-cardbg p-4 rounded-xl border border-gray-800 text-center">
                        <p class="text-xs text-gray-400 uppercase mb-1">Gider</p>
                        <p id="sumExpense" class="text-lg font-bold text-error">0 ₺</p>
                    </div>
                    <div class="col-span-2 bg-cardbg p-4 rounded-xl border border-gray-800 text-center">
                        <p class="text-xs text-gray-400 uppercase mb-1">Net Durum</p>
                        <p id="sumBalance" class="text-2xl font-bold">0 ₺</p>
                    </div>
                </div>

                <!-- Chart -->
                <div class="bg-cardbg p-4 rounded-xl border border-gray-800">
                    <h3 class="text-sm font-semibold text-gray-400 mb-4 text-center">Gider Dağılımı</h3>
                    <div class="relative w-full aspect-square max-w-[250px] mx-auto">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAVIGATION -->
        <nav class="fixed bottom-0 left-0 right-0 bg-cardbg border-t border-gray-800 flex items-center justify-around h-[65px] z-40 pb-safe">
            <button onclick="switchTab('ekle')" id="tab-ekle" class="tab-active flex-1 h-full flex flex-col items-center justify-center gap-1 transition-colors">
                <span class="text-xl">➕</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Ekle</span>
            </button>
            <button onclick="switchTab('gecmis')" id="tab-gecmis" class="tab-inactive flex-1 h-full flex flex-col items-center justify-center gap-1 transition-colors">
                <span class="text-xl">📜</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Geçmiş</span>
            </button>
            <button onclick="switchTab('ozet')" id="tab-ozet" class="tab-inactive flex-1 h-full flex flex-col items-center justify-center gap-1 transition-colors">
                <span class="text-xl">📊</span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Özet</span>
            </button>
        </nav>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full flex items-center gap-3 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">Kaydedildi!</span>
    </div>

    <!-- SCRIPT -->
    <script>
        // --- PWA SERVICE WORKER ---
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // --- AUTH & STATE ---
        let appPw = localStorage.getItem('budget_pw') || '';
        let allCategories = { expense: [], income: [] };
        let transactions = [];
        let chartInstance = null;

        // Startup Check
        if(appPw) {
            verifyLogin(appPw);
        }

        async function login() {
            const pw = document.getElementById('passwordInput').value;
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Bekleyin...';
            await verifyLogin(pw);
            btn.textContent = 'Giriş Yap';
        }

        async function verifyLogin(pw) {
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pw })
                });
                if(res.ok) {
                    appPw = pw;
                    localStorage.setItem('budget_pw', pw);
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    initApp(); 
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch(e) {
                alert("Sunucuya bağlanılamadı.");
            }
        }

        const fetchAPI = async (url, options = {}) => {
            options.headers = {
                ...options.headers,
                'x-app-password': appPw,
                'Content-Type': 'application/json'
            };
            const res = await fetch(url, options);
            if(res.status === 401) {
                localStorage.removeItem('budget_pw');
                location.reload();
            }
            if(!res.ok) throw new Error('API Hatası');
            return res.json();
        };

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        function initApp() {
            const now = new Date();
            const dateInput = document.getElementById('date');
            dateInput.valueAsDate = now;
            updateDateDisplay(dateInput.value); // Initial display
            loadCategoriesAndActions();
            loadDashboard();
        }

        // Tarih gösterimini güncelle
        function updateDateDisplay(val) {
            if(!val) return;
            const [y, m, d] = val.split('-');
            const months = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
            document.getElementById('dateDisplay').textContent = `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
        }

        document.getElementById('date').addEventListener('change', (e) => {
            updateDateDisplay(e.target.value);
        });

        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(el => {
                el.classList.remove('tab-active');
                el.classList.add('tab-inactive');
            });
            document.getElementById(`tab-${tabId}`).classList.remove('tab-inactive');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
        }

        function setType(type) {
            document.getElementById('type').value = type;
            const btnEx = document.getElementById('btnExpense');
            const btnIn = document.getElementById('btnIncome');
            if (type === 'Gider') {
                btnEx.className = 'flex-1 py-2 text-sm font-medium transition-all bg-error text-black rounded-lg shadow-md';
                btnIn.className = 'flex-1 py-2 text-sm font-medium text-gray-400 transition-all rounded-lg';
                updateCategoryDropdown('expense');
            } else {
                btnEx.className = 'flex-1 py-2 text-sm font-medium text-gray-400 transition-all rounded-lg';
                btnIn.className = 'flex-1 py-2 text-sm font-medium transition-all bg-accent text-black rounded-lg shadow-md';
                updateCategoryDropdown('income');
            }
        }

        function updateCategoryDropdown(typeKey) {
            const select = document.getElementById('category');
            select.innerHTML = '<option value="" disabled selected>Seçiniz</option>';
            const list = allCategories[typeKey] || [];
            list.forEach(cat => {
                let opt = document.createElement('option');
                opt.value = cat; opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        async function loadCategoriesAndActions() {
            try {
                const data = await fetchAPI('/api/categories');
                allCategories = data.categories;
                renderQuickActions(data.quickActions);
                setType('Gider');
            } catch(e) {
                console.error(e);
            }
        }

        function renderQuickActions(actions) {
            const container = document.querySelector('.overflow-x-auto');
            container.innerHTML = '';
            actions.forEach(act => {
                const btn = document.createElement('button');
                btn.className = 'shrink-0 bg-cardbg border border-gray-700 rounded-full px-4 py-2 text-sm flex items-center gap-1 active:scale-95 transition';
                btn.textContent = act.label;
                btn.onclick = () => quickAction(act.amount, act.description, act.type, act.category);
                container.appendChild(btn);
            });
        }

        function quickAction(amount, desc, type, cat) {
            setType(type);
            document.getElementById('amount').value = amount;
            document.getElementById('description').value = desc;
            document.getElementById('category').value = cat;
            const d = new Date();
            document.getElementById('date').valueAsDate = d;
            updateDateDisplay(document.getElementById('date').value);
        }

        document.getElementById('budgetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.textContent;
            btn.disabled = true; btn.textContent = '...';
            const data = {
                amount: document.getElementById('amount').value,
                description: document.getElementById('description').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                date: document.getElementById('date').value
            };
            try {
                await fetchAPI('/api/transactions', { method: 'POST', body: JSON.stringify(data) });
                showToast('Kaydedildi!', 'success');
                document.getElementById('amount').value = '';
                document.getElementById('description').value = '';
                loadDashboard();
            } catch(e) {
                showToast('Hata oluştu', 'error');
            } finally {
                btn.disabled = false; btn.textContent = originalText;
            }
        });

        async function loadDashboard() {
            try {
                transactions = await fetchAPI('/api/transactions');
                renderHistory();
                renderDashboard();
            } catch(e) {
                document.getElementById('historyList').innerHTML = '<div class="text-center text-red-400">Veriler alınamadı.</div>';
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            // Sadece son 50 tanesini göster
            const last50 = transactions.slice(0, 50);
            if(last50.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-500 py-4">Kayıt yok.</div>';
                return;
            }
            last50.forEach(t => {
                if(!t.amount && !t.category) return;
                const isExpense = t.type === 'Gider';
                const el = document.createElement('div');
                el.className = "flex items-center justify-between bg-cardbg p-3 rounded-xl border border-gray-800";
                el.innerHTML = `
                    <div class="flex-1 overflow-hidden">
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-sm text-gray-200 truncate">${t.category}</span>
                            <span class="text-xs text-gray-500">${t.date}</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate">${t.description || '-'}</p>
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <span class="font-bold whitespace-nowrap ${isExpense ? 'text-error' : 'text-success'}">
                            ${isExpense ? '-' : '+'}${t.amount} ₺
                        </span>
                        <button onclick="deleteRow(${t.rowId})" class="text-gray-500 hover:text-red-500 active:scale-90 text-lg">🗑️</button>
                    </div>
                `;
                list.appendChild(el);
            });
        }

        async function deleteRow(id) {
            if(!confirm("İşlemi silmek istediğinize emin misiniz?")) return;
            try {
                await fetchAPI(`/api/transactions/${id}`, { method: 'DELETE' });
                showToast('İşlem silindi', 'success');
                loadDashboard();
            } catch(e) {
                showToast('Silinemedi', 'error');
            }
        }

        function renderDashboard() {
            let sumIn = 0, sumEx = 0;
            const categorySums = {};
            const now = new Date();
            const currentMonth = now.getMonth() + 1;
            const currentYear = now.getFullYear();

            transactions.forEach(t => {
                if(!t.amount || !t.date) return;
                
                const parts = t.date.split('.');
                const tMonth = parseInt(parts[1]);
                const tYear = parseInt(parts[2]);

                if (tMonth === currentMonth && tYear === currentYear) {
                    const amt = parseFloat(t.amount);
                    if(t.type === 'Gider') {
                        sumEx += amt;
                        categorySums[t.category] = (categorySums[t.category] || 0) + amt;
                    } else {
                        sumIn += amt;
                    }
                }
            });

            const net = sumIn - sumEx;
            document.getElementById('sumIncome').textContent = sumIn.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
            document.getElementById('sumExpense').textContent = sumEx.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
            document.getElementById('sumBalance').textContent = net.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ₺';
            document.getElementById('sumBalance').className = `text-2xl font-bold ${net < 0 ? 'text-error' : 'text-success'}`;
            renderChart(categorySums);
        }

        function renderChart(dataObj) {
            const ctx = document.getElementById('expenseChart');
            const labels = Object.keys(dataObj);
            const data = Object.values(dataObj);
            if(chartInstance) chartInstance.destroy();
            if(labels.length === 0) return;
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#CF6679', '#BB86FC', '#03DAC6', '#FFB74D', '#64B5F6', '#E57373', '#FFF176'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#bbb', font: {size: 10} } }
                    }
                }
            });
        }
    </script>
</body>
</html>
